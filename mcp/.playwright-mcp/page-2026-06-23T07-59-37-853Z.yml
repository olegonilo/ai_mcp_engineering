            - paragraph [ref=e328]:
              - text: For even more inspiration, here are all of our favorite
              - link "Thanksgiving pie recipes" [ref=e329] [cursor=pointer]:
                - /url: https://sallysbakingaddiction.com/thanksgiving-pie-recipes/
              - text: ". But today, I’m showing you how I make banoffee pie:"
            - generic [ref=e330]: Advertisement
            - figure [ref=e331]:
              - img "banoffee pie with whipped cream on top" [ref=e332]
            - heading "What Is Banoffee Pie?" [level=2] [ref=e333]
            - paragraph [ref=e334]: A popular English dessert, banoffee = bananas + toffee. A rich combination of different textures and flavors, banoffee pie combines a cookie/biscuit or graham cracker crust with silky dulce de leche, bananas, and homemade whipped cream. I normally have impeccable self control around all the desserts I bake, but I literally could not put down my fork with this pie. Between the soft, crunchy, creamy, gooey, and sweet—there’s no denying banoffee pie’s allure. You’ll be hooked.
            - paragraph [ref=e335]:
              - text: Adding to its appeal, banoffee pie is the EASIEST pie you’ll ever make. The 3-ingredient
              - link "graham cracker crust" [ref=e336] [cursor=pointer]:
                - /url: https://sallysbakingaddiction.com/how-to-make-a-perfect-graham-cracker-crust/
              - text: is pre-baked, but that’s all the oven time required. Just like in
              - link "strawberry cream cheese pie" [ref=e337] [cursor=pointer]:
                - /url: https://sallysbakingaddiction.com/strawberry-cream-cheese-pie/
              - text: ", baking the crust makes the whole pie more sturdy. Layer the remaining ingredients on top, then refrigerate until ready to dig in. That’s it!"
            - paragraph [ref=e338]:
              - text: Instead of graham crackers, this pie is also fantastic with a
              - link "Biscoff pie crust" [ref=e339] [cursor=pointer]:
                - /url: https://sallysbakingaddiction.com/biscoff-pie-crust/
              - text: .
            - generic [ref=e340]: Advertisement
            - figure [ref=e341]:
              - img "two hands pressing graham cracker crust into glass pie dish." [ref=e342]
            - heading "What Is Dulce de Leche?" [level=2] [ref=e343]
            - paragraph [ref=e344]:
              - text: Dulce de leche is similar to caramel, but a little sweeter and creamier. It’s prepared by slowly heating sugar and milk until everything caramelizes. If we’re getting all scientific, I learned that a lot of the flavor comes from the
              - link "Maillard reaction" [ref=e345] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Maillard_reaction
              - text: . Interesting!
              - emphasis [ref=e346]: Dulce de leche
              - text: "is Spanish for candy made/of milk. There are a few ways to prepare dulce de leche including:"
            - list [ref=e347]:
              - listitem [ref=e348]: The classic method of cooking down and constantly stirring milk and sugar
              - listitem [ref=e349]: The shortcut method of cooking sweetened condensed milk
            - paragraph [ref=e350]: We’re using the shortcut method today, but I included a link to a classic dulce de leche recipe in the recipe notes. Both are delicious!
            - figure [ref=e351]:
              - img "2 images of can of sweetened condensed milk and dulce de leche in a glass bowl" [ref=e352]
            - heading "Dulce de Leche Made From Sweetened Condensed Milk" [level=2] [ref=e353]
            - paragraph [ref=e354]:
              - text: There are a couple ways you can make dulce de leche from a can of sweetened condensed milk. You can boil it—the actual closed can—in a pot of water for a couple hours or you can pour the sweetened condensed milk in a pie dish and bake it in a water bath. I prefer the oven method because I’ve heard some pretty scary stories about the hot cans bursting open after boiling for so long.
              - strong [ref=e355]: "Items you need:"
            - list [ref=e356]:
              - listitem [ref=e357]: Large roasting pan
              - listitem [ref=e358]:
                - link "Pie dish" [ref=e359] [cursor=pointer]:
                  - /url: https://amzn.to/4dFDnNU
              - listitem [ref=e360]: 1 can of sweetened condensed milk
              - listitem [ref=e361]: Aluminum foil
            - paragraph [ref=e362]:
              - strong [ref=e363]: "Instructions:"
            - list [ref=e364]:
              - listitem [ref=e365]: Pour the sweetened condensed milk in a pie dish.
              - listitem [ref=e366]: Place the pie dish in a large roasting pan and place the roasting pan in the oven.
              - listitem [ref=e367]:
                - text: Fill the roasting pan with enough HOT water until it reaches halfway up the pie dish. This is exactly what we do when we bake
                - link "cheesecake" [ref=e368] [cursor=pointer]:
                  - /url: https://sallysbakingaddiction.com/classic-cheesecake/
                - text: .
              - listitem [ref=e369]: Loosely cover the pie dish with aluminum foil.
              - listitem [ref=e370]: Heat oven to 350°F (177°C).
              - listitem [ref=e371]: Bake until sweetened condensed milk has thickened and caramelized, about 2 hours. Add more hot water after 1 hour, since some of it has evaporated.
            - generic [ref=e372]: Advertisement
            - paragraph [ref=e373]:
              - text: All of the “work” is hands-off. After 2 hours, the sweetened condensed milk has turned into golden dulce de leche.
              - emphasis [ref=e374]: Magic.
              - text: Let the dulce de leche cool, then pour into your pre-baked graham cracker crust. You can make the dulce de leche up to 2 weeks in advance.
            - figure [ref=e375]:
              - img "pouring dulce de leche onto graham cracker crust" [ref=e376]
            - figure [ref=e377]:
              - img "bananas on top of dulce de leche layer" [ref=e378]
            - figure [ref=e379]:
              - img "spreading fluffy homemade whipped cream on banoffee pie" [ref=e380]
            - paragraph [ref=e381]:
              - text: After that, we have a layer of banana slices. Make sure you use nice yellow bananas and save mushy spotty bananas for recipes like
              - link "banana bread" [ref=e382] [cursor=pointer]:
                - /url: https://sallysbakingaddiction.com/best-banana-bread-recipe/
              - text: and
              - link "banana muffins" [ref=e383] [cursor=pointer]:
                - /url: https://sallysbakingaddiction.com/banana-muffins/
              - text: .
            - paragraph [ref=e384]:
              - text: Have you ever had caramel and banana before? This pie is exactly that, but better. A voluminous mountain of soft
              - link "homemade whipped cream" [ref=e385] [cursor=pointer]:
                - /url: https://sallysbakingaddiction.com/homemade-whipped-cream/
              - text: is the finishing touch! Piled high, this creamy layer balances out all the other textures and flavors in this completely irresistible pie.
            - paragraph [ref=e386]: Banoffee pie is so simple that you’ll feel like you’re doing something wrong. You’re not—it really is this easy. If pie crust isn’t your thing, banoffee pie is!
            - figure [ref=e387]:
              - img "slice of banoffee pie on a white plate" [ref=e388]
            - paragraph [ref=e389]:
              - text: For even more delicious flavor combinations with bananas, you’ll want to try this
              - link "peanut butter banana cream pie" [ref=e390] [cursor=pointer]:
                - /url: https://sallysbakingaddiction.com/peanut-butter-banana-cream-pie/
              - text: next.
