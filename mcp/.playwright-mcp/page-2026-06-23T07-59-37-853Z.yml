                  - heading "Instructions" [level=3] [ref=e585]
                  - list [ref=e587]:
                    - listitem [ref=e588]: Preheat oven to 350°F (177°C).
                    - listitem [ref=e590]:
                      - strong [ref=e591]: "Make the crust:"
                      - text: If you’re starting out with full graham crackers, use a
                      - link "food processor" [ref=e592] [cursor=pointer]:
                        - /url: https://amzn.to/3zNDEZw
                      - text: or blender to grind them into fine crumbs. Stir the graham cracker crumbs and granulated sugar together in a medium bowl, and then stir in the melted butter. The mixture will be thick, coarse, and sandy. Try to smash/break up any large chunks. Pour the mixture into an ungreased
                      - link "9-inch pie dish" [ref=e593] [cursor=pointer]:
                        - /url: https://amzn.to/4dFDnNU
                      - text: . With medium pressure using your hand, pat the crumbs down into the bottom and up the sides to make a compact crust. Do not pack down with heavy force because that makes the crust too hard. Simply pat down until the mixture is no longer crumby/crumbly.
                      - emphasis [ref=e594]:
                        - strong [ref=e595]: "Tips:"
                        - text: You can use a small flat-bottomed measuring cup to help press down the bottom crust and smooth out the surface, but do not pack down too hard. And run a spoon around the bottom “corner” where the edge and bottom meet to help make a rounded crust⁠—this helps prevent the crust from falling apart. For more shaping technique tips, see the
                        - link "graham cracker crust" [ref=e596] [cursor=pointer]:
                          - /url: https://sallysbakingaddiction.com/how-to-make-a-perfect-graham-cracker-crust/
                        - text: recipe page.
                    - listitem [ref=e597]: Bake the crust for 15 minutes. Cool for 15 minutes.
                    - listitem [ref=e598]:
                      - strong [ref=e599]: "For the whipped cream:"
                      - text: Using a hand mixer or a stand mixer fitted with a whisk attachment, whip the heavy cream, sugar, and vanilla extract on medium-high speed until medium peaks form, about 3-4 minutes. Medium peaks are between soft/loose peaks and stiff peaks and are the perfect consistency for topping and piping on desserts.
                    - listitem [ref=e600]: Spread dulce de leche on top of the crust. Arrange banana slices in 1–2 layers on top of the dulce de leche, then spread whipped cream on top.
                    - listitem [ref=e602]: Refrigerate pie uncovered for at least 2 hours and up to 1 day. Garnish with toppings before serving, if desired.
                    - listitem [ref=e603]: Cover and store leftover pie in the refrigerator for up to 5 days.
                - separator [ref=e604]
                - generic [ref=e605]:
                  - heading "Notes" [level=3] [ref=e606]
                  - list [ref=e608]:
                    - listitem [ref=e610]:
                      - strong [ref=e611]: "Make Ahead Instructions:"
                      - text: Cover the baked and cooled graham cracker crust tightly and store in the refrigerator for up to 2 days or freeze for up to 3 months. Thaw in the refrigerator before using. Dulce de leche, instructions below, can be made up to 2 weeks in advance. Cover tightly and store in the refrigerator. The fully assembled pie can be prepared up to 1 day in advance. Store uncovered in the refrigerator until ready to serve. I don’t recommend freezing the prepared banoffee pie because it doesn’t thaw very nicely, but you can certainly freeze any leftover slices for up to 3 months.
                    - listitem [ref=e612]:
                      - strong [ref=e613]: Special Tools
                      - text: "(affiliate links):"
                      - link "Food Processor" [ref=e614] [cursor=pointer]:
                        - /url: https://amzn.to/3zNDEZw
                      - text: "|"
                      - link "Glass Mixing Bowl" [ref=e615] [cursor=pointer]:
                        - /url: https://amzn.to/3mPQvWq
                      - text: "|"
                      - link "9-inch Pie Dish" [ref=e616] [cursor=pointer]:
                        - /url: https://amzn.to/4dFDnNU
                      - text: "| Electric Mixer ("
                      - link "Handheld" [ref=e617] [cursor=pointer]:
                        - /url: https://amzn.to/3W5TmJc
                      - text: or
                      - link "Stand" [ref=e618] [cursor=pointer]:
                        - /url: https://amzn.to/3OMbx3g
                      - text: )
                    - listitem [ref=e620]:
                      - strong [ref=e621]: "Dulce de Leche:"
                      - text: You can use store-bought dulce de leche, but I recommend making it at home. You can make it
                      - link "completely from scratch" [ref=e622] [cursor=pointer]:
                        - /url: https://www.foodnetwork.com/recipes/alton-brown/dulce-de-leche-recipe-1948282
                      - text: "or use 1 (standard 14-ounce/397g) can of sweetened condensed milk. Instructions: Pour the sweetened condensed milk in a pie dish. Place the pie dish in a large roasting pan and place the roasting pan in the oven. Fill the roasting pan with enough HOT water until it reaches halfway up the pie dish. Loosely cover the pie dish with aluminum foil. Heat oven to 350°F (177°C). Bake until sweetened condensed milk has thickened and caramelized, about 2 hours. Add more hot water to the roasting pan after 1 hour, since some of it has evaporated. After 2 hours, the sweetened condensed milk has turned into golden dulce de leche. (If not, continue to bake.) Let the dulce de leche cool, then pour into your pre-baked graham cracker crust. You can make the dulce de leche up to 2 weeks in advance."
                    - listitem [ref=e623]:
                      - strong [ref=e624]: "Bananas Browning:"
                      - text: Though I haven’t experienced the bananas browning underneath the whipped cream, you can certainly squeeze a few drops of fresh lemon juice all over the banana slices before layering them into the pie. This keeps the banana slices fresh, especially if you’re making the pie a day in advance. With a small amount of juice, you won’t detect the lemon flavor.
                    - listitem [ref=e625]:
                      - strong [ref=e626]: "Non-US Readers:"
                      - text: If graham crackers are not available where you live, we have also tested this pie with a crust made from digestive biscuits, and it turned out great. Use 200g ground digestive biscuit crumbs (about 2 cups; 13–14 biscuits), 1/3 cup (67g) granulated sugar, and 6 Tablespoons (85g) melted butter. Pre-bake the crust for a bit longer, about 16-17 minutes.
