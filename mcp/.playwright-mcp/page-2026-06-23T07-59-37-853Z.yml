            - listitem [ref=e944]:
              - article [ref=e945]:
                - generic [ref=e946]:
                  - generic [ref=e947]: "Laura says:"
                  - generic [ref=e948]: July 6, 2025
                - generic [ref=e949]:
                  - paragraph [ref=e950]: The pie was delicious. I added some salted cashews to the bottom layer. It was a little too sweet for my liking. I think next time I would put less of the condensed milk on the bottom– just enough to create a layer. It also got a bit wet as the bananas released juice. Next time I would make sure to let the condensed milk cool even further, put the condensed milk layer into the crust and put it in the fridge before adding the bananas. I would also whip the cream to be closer to stiff peaks as it seemed to lose fluffiness after several hours.
