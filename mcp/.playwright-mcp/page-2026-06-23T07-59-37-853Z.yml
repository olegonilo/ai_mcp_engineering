            - listitem [ref=e993]:
              - article [ref=e994]:
                - generic [ref=e995]:
                  - generic [ref=e996]: "Pauline Peterson says:"
                  - generic [ref=e997]: April 25, 2025
                - paragraph [ref=e999]: This recipe is BOMB! One of the best pies I have ever had (and as a French person, I’m posh about food). In France, it is common to use Biscoff cookies (we call them Speculoos) to replace Graham Crackers, so I continue to do so, even though I live in the US now. I added the same amount of butter (European grass-fed salted butter, of course) and sugar and packed it tightly with a glass. It kind of caramelized once baked; it was delicious. I made my own dulce de leche in the oven. It was so good that I made another pie two days later (you don’t want these bananas to go to waste, do you?). Thank you for this recipe!
                - link "Reply to Pauline Peterson" [ref=e1000] [cursor=pointer]:
                  - /url: "#comment-1304065"
                  - text: Reply
