            - generic [ref=e158]: Advertisement - Continue Reading Below
            - paragraph [ref=e160]:
              - text: Whenever I need a quick and easy
              - link "weeknight dinner" [ref=e161] [cursor=pointer]:
                - /url: https://www.delish.com/weeknight-dinners/
              - text: that screams fresh and simple, I always turn to this baked tilapia. In my opinion, tilapia doesn't get enough attention. This tender fish has a mild-enough flavor that even
              - link "seafood" [ref=e162] [cursor=pointer]:
                - /url: https://www.delish.com/cooking/recipe-ideas/g2992/weeknight-seafood-dinners/
              - text: "-haters can get on board, is quick cooking enough to get dinner on the table in less than 30 minutes, AND is simple enough that you can change up the flavors and enjoy it again and again without getting bored. I don’t know about you, but those are huge wins for me. Move over,"
              - link "baked salmon" [ref=e163] [cursor=pointer]:
                - /url: https://www.delish.com/cooking/recipe-ideas/a55315/best-baked-salmon-recipe/
              - text: —tonight, we’re having tilapia.
            - paragraph [ref=e164]:
              - strong [ref=e165]: "What People Are Saying:"
              - emphasis
              - text: “I love tilapia, such a mild flavored and versatile white fish. This recipe is the BOMB! So tasty, simple and inexpensive! I almost guarantee you have these ingredients available right now. Try this recipe and you will repeat it, no doubt!” -
              - emphasis [ref=e166]:
                - emphasis [ref=e167]: cat4930
              - emphasis
            - paragraph [ref=e168]:
              - text: "“I completely agree with a previous poster: this tastes completely fantastic and well beyond what the simple ingredients would suggest. I wanted to diversify beyond the tried-and-true salmon that I always eat. Tilapia is now in the rotation—-this was a fast, simple and delicious recipe.” -"
              - emphasis [ref=e169]: GoldFish
              - emphasis
            - heading "How To Make Baked Tilapia" [level=2] [ref=e170]:
              - strong [ref=e171]: How To Make Baked Tilapia
            - heading "INGREDIENTS" [level=2] [ref=e172]
            - list [ref=e173]:
              - listitem [ref=e174]:
                - strong [ref=e175]: "Tilapia filets:"
                - text: Like with buying nearly any variety of seafood, there are a few things you’ll want to keep in mind when buying tilapia filets. I like to look to the
                - link "Monterey Bay Aquarium’s Seafood Watch" [ref=e176] [cursor=pointer]:
                  - /url: https://www.seafoodwatch.org/recommendations/download-consumer-guides/sustainable-tilapia-guide
                - text: "for details, but as a few rules of thumb: farmed tilapia is fine, though wild-caught is great if you can find it; avoid tilapia from China (instead go for tilapia farmed in Peru, Ecuador Mexico, Indonesia, or Honduras); and go for fresh over frozen if you can (though both should work here). When in doubt, talk to your fishmonger or the person working the seafood counter at your local grocery store for help. Heads up: you can also use tilapia"
                - emphasis [ref=e177]: loins
                - text: here, as that just refers to the thickest part of the filet.
              - listitem [ref=e178]:
                - strong [ref=e179]: "Kosher Salt:"
                - text: I like to use kosher salt (rather than iodized or sea salt) in my kitchen because it has larger crystals than other salts, so it almost never ends up tasting too salty. If you don’t have it, start with half the amount of whatever salt you do have to guarantee your fish won’t be over-seasoned.
              - listitem [ref=e180]:
                - strong [ref=e181]: "Butter:"
                - text: I personally like to use butter here, but I have been known to use olive oil (like we did in the video above) too, especially when I want to keep my meal dairy-free. Use whichever you prefer.
              - listitem [ref=e182]:
                - strong [ref=e183]: "Red Pepper Flakes:"
                - text: I like the kick these bring to this mild fish, but feel free to skip if you or your family are sensitive to spice.
              - listitem [ref=e184]:
                - strong [ref=e185]: "Lemons:"
                - text: You’ll need two lemons for this recipe, one used mostly for its juice and zest, and the other used for slicing. If you’re tempted to skip the sliced rounds, don’t! Not only do they make for an extra special presentation, they also add extra flavor to your fish during the cooking process.
              - listitem [ref=e186]:
                - strong [ref=e187]: "Parsley:"
                - text: To me, one of the biggest differences between a good at-home meal and a great one is the garnishes. They might seem like overkill, but they’re truly what make a dinner feel extra special, so I try to always keep some greenery in my fridge to sprinkle over top of my meals. Parsley’s a forever fave, but use what you’ve got!
            - heading "STEP-BY-STEP INSTRUCTIONS" [level=2] [ref=e188]
            - paragraph [ref=e189]: First, get your oven preheated to 400°. Place your tilapia in a baking dish, then season both sides with salt and pepper. Set aside while you prepare your garlic and lemon butter.
            - generic [ref=e192]: Advertisement - Continue Reading Below
            - generic [ref=e196]:
              - generic [ref=e197]:
                - img "baked tilapia with lemons" [ref=e198]
                - link "pinterest" [ref=e199] [cursor=pointer]:
                  - /url: //pinterest.com/pin/create/button/?url=https://www.delish.com/cooking/recipe-ideas/a19665918/oven-baked-tilapia-recipe/&description=Delish&media=https://hips.hearstapps.com/hmg-prod/images/baked-tilapia-stills-1-66d8b3cb96d4b.jpg?resize=1600:*
                  - img "pinterest"
              - generic [ref=e201]: "PHOTO: TIM RACCA MORRISH"
            - paragraph [ref=e202]:
              - text: "I like to get all my ingredients ready first (and I’ve got a variety of little pinch bowls I keep handy in my cabinet just for this purpose), but feel free to add things directly into your mixing bowl as they are ready. Here’s the order I like to do things in: first up, lemons. Since you’ll end up with an unused half of a lemon here, zesting, slicing, and juicing them"
              - emphasis [ref=e203]: before
              - text: your garlic means you can use that half another time without having it taste weird. Then mince your garlic—larger, uneven pieces are okay here, because we’re really in it for the flavor, but feel free to show off those knife skills if you’ve got them. Then mix everything together (again, feel free to skip the red pepper flakes if you need). I like to use a fork to break up the lemon zest and make sure there are no clumps of it hiding out anywhere.
