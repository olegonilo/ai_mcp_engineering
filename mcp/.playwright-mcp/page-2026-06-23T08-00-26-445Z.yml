                    - heading "Method" [level=2] [ref=e246]
                    - list [ref=e247]:
                      - listitem [ref=e248]:
                        - heading "step 1" [level=3] [ref=e249]
                        - paragraph [ref=e251]:
                          - text: Whizz the biscuits to crumbs in a
                          - link "food processor" [ref=e252] [cursor=pointer]:
                            - /url: https://www.bbcgoodfood.com/content/test-five-best-food-processors
                          - text: or put in a strong plastic bag and bash with a
                          - link "rolling pin" [ref=e253] [cursor=pointer]:
                            - /url: https://www.bbcgoodfood.com/content/test-best-rolling-pins
                          - text: . Add the butter and whizz again briefly, then tip the buttery crumbs into a 22cm fluted tart tin. Use the back of a spoon to press the crumbs into the tin and up the sides until the whole case is lined. Chill for at least 10 mins.
                      - listitem [ref=e254]:
                        - heading "step 2" [level=3] [ref=e255]
                        - paragraph [ref=e257]:
                          - text: Heat oven to 200C/180C fan/gas 8. Halve the bananas lengthways and tip into a shallow
                          - link "roasting tray" [ref=e258] [cursor=pointer]:
                            - /url: https://www.bbcgoodfood.com/review/test-five-best-roasting-tins
                          - text: or baking dish. Squeeze over the lime juice, scatter with the brown sugar and bake in the oven for 15-20 mins until caramelised. Leave to cool slightly, then thoroughly mash and spread evenly over the tart base.
                      - listitem [ref=e259]:
                        - heading "step 3" [level=3] [ref=e260]
                        - paragraph [ref=e262]: Tip the caramel into a saucepan, bring to a simmer and bubble for a few minutes to thicken. Add a pinch of flaky sea salt. Crush the banana chips using a rolling pin on a chopping board. Take the pan off the heat and stir in most of the banana chips, then spread the mixture over the banana layer and put back in the fridge for at least 4 hrs to set.
                      - listitem [ref=e263]:
                        - heading "step 4" [level=3] [ref=e264]
                        - paragraph [ref=e266]:
                          - text: To make the peanut butter cream, beat the peanut butter with the icing sugar and 140ml of the cream until smooth.
                          - link "Whisk" [ref=e267] [cursor=pointer]:
                            - /url: https://www.bbcgoodfood.com/content/top-five-whisks
                          - text: the rest of the cream until it just holds its shape, then fold through the peanut butter cream to ripple. Top the tart with pillows of the whipped cream. Scatter with the rest of the crushed banana chips and serve.
